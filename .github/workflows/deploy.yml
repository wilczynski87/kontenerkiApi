name: Deploy to VPS

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat <<EOF > ~/.ssh/config
          Host vps
            HostName ${ secrets.VPS_HOST }
            User ${ secrets.VPS_USER }
            Port ${ secrets.VPS_PORT }
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
          EOF

      - name: Sync project to VPS
        run: |
          rsync -az \
            --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'README.md' \
            ./ vps:/opt/app/

      - name: Build images + zero-downtime deploy
        run: |
          ssh vps "
            cd /opt/app && \
            docker compose pull && \
            docker compose build && \
            docker compose up -d --no-deps --build api && \
            docker compose up -d --no-deps --build email
          "
