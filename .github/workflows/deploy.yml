name: Deploy to VPS

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
          PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat <<EOF > ~/.ssh/config
          Host vps
            HostName $HOST
            User $USER
            Port $PORT
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
          EOF

      - name: Upload repo to VPS
        run: |
          rsync -az --delete --exclude '.git' --exclude '.github' ./ vps:/opt/app/ || {
            echo "rsync failed"
            exit 1
          }

      - name: Build and deploy (zero downtime)
        run: |
          ssh vps "
            docker stop api || true
            docker rm api || true
            docker rmi my-api:latest || true
            cd /opt/app
            docker compose pull
            docker compose build --no-cache
            docker compose up -d --build
          "