name: Deploy to VPS

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: kontenerki

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
          PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat <<EOF > ~/.ssh/config
          Host vps
            HostName $HOST
            User $USER
            Port $PORT
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
          EOF

      - name: Upload repo to VPS
        run: |
          rsync -az --delete --exclude '.git' --exclude '.github' ./ vps:/opt/app/ || {
            echo "rsync failed"
            exit 1
          }

      - name: Create .env on VPS
        run: |
          ssh vps "cat <<EOF > /opt/app/.env
          # === SECRETS ===
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN=${{ secrets.GOOGLE_REFRESH_TOKEN }}
          INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}
          JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}
          JWT_REALM=${{ secrets.JWT_REALM }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          
          # === VARIABLES ===
          API_ENV=${{ vars.API_ENV }}
          API_NAME=${{ vars.API_NAME }}
          API_PORT=${{ vars.API_PORT }}
          DB_HOST=${{ vars.DB_HOST }}
          DB_NAME=${{ vars.DB_NAME }}
          DB_PORT=${{ vars.DB_PORT }}
          DB_USER=${{ vars.DB_USER }}
          EMAIL_USER=${{ vars.EMAIL_USER }}
          ENV=${{ vars.ENV }}
          VALIDITY_MS=${{ vars.VALIDITY_MS }}
          EOF"

      - name: Build and deploy (zero downtime)
        run: |
          ssh vps "
            docker stop api || true
            docker rm api || true
            docker rmi my-api:latest || true
            cd /opt/app
            docker compose pull
            docker compose build --no-cache
            docker compose up -d --build
          "