name: Deploy to VPS

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
          PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat <<EOF > ~/.ssh/config
          Host vps
            HostName $HOST
            User $USER
            Port $PORT
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
          EOF

      - name: Upload main repo to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            ./ vps:/opt/app/

      - name: Ensure email repo exists on VPS
        env:
          EMAIL_REPO_URL: ${{ secrets.EMAIL_REPO_URL }}
          EMAIL_REPO_BRANCH: ${{ secrets.EMAIL_REPO_BRANCH }}
        run: |
          ssh vps "
            if [ ! -d /opt/kontenerkiEmail ]; then
              git clone -b $EMAIL_REPO_BRANCH $EMAIL_REPO_URL /opt/kontenerkiEmail
            else
              cd /opt/kontenerkiEmail && git fetch && git reset --hard origin/$EMAIL_REPO_BRANCH
            fi
          "

      - name: Build and deploy (zero downtime)
        run: |
          ssh vps "
            cd /opt/app && \
            docker compose pull && \
            docker compose build && \
            docker compose up -d --no-deps --build api && \
            docker compose up -d --no-deps --build email
          "
