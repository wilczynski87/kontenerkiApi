ktor:
  application:
    modules:
      - com.kontenery.ApplicationKt.module
  deployment:
    port: ${API_PORT:8100}

api:
  env: ${API_ENV:DEV}

  email:
    host: ${EMAIL_HOST:localhost}
    port: ${EMAIL_PORT:8200}

  db:
    host: ${DB_HOST:db}
    port: ${DB_PORT:5432}
    name: ${DB_NAME:db1}
    user: ${DB_USER:admin_user}
    password: ${DB_PASSWORD:postgres}

