services:
  db:
    image: postgres:18
    container_name: db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${DB_PORT:-5432}:${DB_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin_user" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api
    restart: unless-stopped
    expose:
      - 8100
    ports:
      - "${API_PORT:-8100}:${API_PORT:-8100}"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  email:
    image: wilczynski87/konteneryemail
    container_name: email
    restart: unless-stopped
    expose:
      - 8200
#    ports:
#      - "${EMAIL_PORT:-8200}:${EMAIL_PORT:-8200}"
    env_file:
      - .env

volumes:
  postgres_data: