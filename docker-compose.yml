services:
  db:
    image: postgres:18
    container_name: db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin_user" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
#    image: wilczynski87/konteneryapi
    container_name: api
    restart: unless-stopped
    expose:
      - 8100
    ports:
#      - "8100:8100"
      - "${API_PORT}:${API_PORT}"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  email:
    build:
      context: ../kontenerkiEmail
      dockerfile: Dockerfile
#    image: wilczynski87/konteneryemail
    container_name: email
    restart: unless-stopped
    expose:
      - 8200
    ports:
#      - "8200:8200"
      - "${EMAIL_PORT}:${EMAIL_PORT}"
    env_file:
      - .env

