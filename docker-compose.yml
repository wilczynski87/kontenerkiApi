services:
  db:
    image: postgres:18
    container_name: db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${DB_PORT:-5431}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin_user}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api
    restart: unless-stopped
    expose:
      - 8100
    ports:
      - "${API_PORT:-8100}:${API_PORT:-8100}"
    env_file:
      - .env
    environment:
      # DEV w Dockerze: baza w sieci compose + KSeF sandbox (TEST)
      DB_HOST: db
      DB_PORT: "5432"
      KSEF_ENV: ${KSEF_ENV:-TEST}
      KSEF_BASE_URL: ${KSEF_BASE_URL:-https://api-test.ksef.mf.gov.pl}
      KSEF_API_SUFFIX: ${KSEF_API_SUFFIX:-v2}
      KSEF_NIP: ${KSEF_NIP:-8943278612}
    depends_on:
      db:
        condition: service_healthy

  email:
    image: wilczynski87/konteneryemail
    container_name: email
    restart: unless-stopped
    expose:
      - "${EMAIL_PORT:-8200}"
    env_file:
      - .env
    environment:
      API_NAME: api
      API_PORT: ${API_PORT:-8100}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}

volumes:
  postgres_data: