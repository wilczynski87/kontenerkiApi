services:
  db:
    image: postgres:18
    container_name: db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Host port (DB_PORT) maps to PostgreSQL inside the container (always 5432).
      - "${DB_PORT:-5431}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin_user}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api
    restart: unless-stopped
    expose:
      - 8100
    ports:
      - "${API_PORT:-8100}:${API_PORT:-8100}"
    env_file:
      - .env
    environment:
      # Inside the Compose network PostgreSQL listens on 5432, regardless of host DB_PORT.
      DB_HOST: db
      DB_PORT: "5432"
      EMAIL_HOST: email
    depends_on:
      db:
        condition: service_healthy

  email:
    image: wilczynski87/konteneryemail
    container_name: email
    restart: unless-stopped
    expose:
      - 8200
    ports:
      - "${EMAIL_PORT:-8200}:${EMAIL_PORT:-8200}"
    env_file:
      - .env
    environment:
      API_NAME: api
      API_PORT: ${API_PORT:-8100}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}

volumes:
  postgres_data: