version: '3.9'

services:
  db:
    image: postgres
    container_name: db
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kontenery_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: api
    ports:
      - "100:100"
    environment:
      DB_URL: "jdbc:postgresql://db:5432/kontenery_db"
      DB_USER: "admin"
      DB_PASSWORD: "postgres"
    depends_on:
      - db


volumes:
  postgres_data: