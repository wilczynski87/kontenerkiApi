services:
  db:
    image: postgres:18
    container_name: db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${DB_PORT:-5432}:${DB_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin_user" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api
    restart: unless-stopped
    expose:
      - 8100
    ports:
      - "${API_PORT:-8100}:${API_PORT:-8100}"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      EMAIL_HOST: email
    depends_on:
      db:
        condition: service_healthy

  email:
    build:
      context: ../kontenerkiEmail
      dockerfile: Dockerfile
    container_name: email
    restart: unless-stopped
    expose:
      - 8200
    ports:
      - "${EMAIL_PORT:-8200}:${EMAIL_PORT:-8200}"
    env_file:
      - .env
    environment:
      API_NAME: api
      API_PORT: ${API_PORT:-8100}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}

  web:
    build:
      context: ../kontenerkiWeb
      dockerfile: Dockerfile
    container_name: web
    restart: unless-stopped
    expose:
      - 80
    ports:
      - "80:80"
    environment:
      API_NAME: api
      API_PORT: 8100
      ENV: DEV

volumes:
  postgres_data:
